<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Troogood — Invoice Management (Free OCR)</title>
  <meta name="description"
    content="Internal invoice management system for Troogood — scan, log and track inward and outward goods." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    // Set workerSrc globally for PDF.js
    if (window['pdfjs-dist/build/pdf']) {
      window['pdfjs-dist/build/pdf'].GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    }
  </script>
  <!-- Tesseract.js loaded lazily inside App.jsx on first scan -->
</head>

<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      console.error('GLOBAL ERROR:', msg, 'at', url, 'line', lineNo);
      alert('Error loading app: ' + msg);
      return false;
    };
  </script>
  <script type="text/babel" src="App.jsx"></script>
</body>

</html>
